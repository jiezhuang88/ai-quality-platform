name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run quality gate
        run: python3 scripts/quality_gate.py

      - name: Run SDLC quality gate sample
        run: python3 scripts/sdlc_gate.py --manifest examples/sdlc/evidence-manifest.sample.json --report reports/sdlc-quality-report.md

      - name: Run gate tests
        run: python3 -m unittest discover -s tests

      - name: Compile Java workbench
        run: |
          cd java-quality-workbench
          ./scripts/test.sh
